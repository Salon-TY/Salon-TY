# Configuration Netlify — gestion du cache

# Le HTML ne doit JAMAIS être mis en cache → toujours la dernière version
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Les images peuvent être mises en cache longtemps (elles ne changent pas)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
